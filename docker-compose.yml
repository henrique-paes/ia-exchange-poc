# Dev stack with hot reload. For a production-style build, use the
# multi-stage Dockerfiles in docker/ directly (target: runtime / serve).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-library}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-library}
      POSTGRES_DB: ${POSTGRES_DB:-library}
    ports:
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-library}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.dev.Dockerfile
    user: '${UID:-1000}:${GID:-1000}'
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-library}:${POSTGRES_PASSWORD:-library}@db:5432/${POSTGRES_DB:-library}?schema=public
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-5173}
    ports:
      - '${BACKEND_PORT:-3001}:3000'
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:24-alpine
    user: '${UID:-1000}:${GID:-1000}'
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3001}
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  db-data:
